name: procurex-production

x-server-environment: &server-environment
  APP_ENV: ${APP_ENV:-production}
  NODE_ENV: ${NODE_ENV:-production}
  PORT: ${PORT:-4000}
  REQUEST_BODY_LIMIT: ${REQUEST_BODY_LIMIT:-160mb}
  DATABASE_URL: ${DATABASE_URL:-postgresql://procurex:change-me@postgres:5432/procurex}
  DIRECT_URL: ${DIRECT_URL:-postgresql://procurex:change-me@postgres:5432/procurex}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://elasticsearch:9200}
  COMPLIANCE_SEARCH_INDEX: ${COMPLIANCE_SEARCH_INDEX:-procurex-compliance-admin}
  S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-procurex}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-change-me-minio-secret}
  S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
  S3_DOCUMENT_BUCKET: ${S3_DOCUMENT_BUCKET:-procurex-documents}
  DOCUMENT_STORAGE_DRIVER: ${DOCUMENT_STORAGE_DRIVER:-s3}
  BID_DOCUMENT_STORAGE_DRIVER: ${BID_DOCUMENT_STORAGE_DRIVER:-s3}
  BID_DOCUMENT_MAX_BYTES: ${BID_DOCUMENT_MAX_BYTES:-26214400}
  DOCUMENT_MAX_UPLOAD_BYTES: ${DOCUMENT_MAX_UPLOAD_BYTES:-26214400}
  PROFILE_IMAGE_UPLOAD_DIR: ${PROFILE_IMAGE_UPLOAD_DIR:-.data/profile-images}
  PROFILE_IMAGE_MAX_BYTES: ${PROFILE_IMAGE_MAX_BYTES:-2097152}
  OFFICIAL_DOCUMENT_UPLOAD_DIR: ${OFFICIAL_DOCUMENT_UPLOAD_DIR:-.data/official-documents}
  APP_PUBLIC_URL: ${APP_PUBLIC_URL:-https://your-domain.example}
  CORS_ORIGINS: ${CORS_ORIGINS:-https://your-domain.example}
  TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
  IDENTITY_EMAIL_PROVIDER: ${IDENTITY_EMAIL_PROVIDER:-resend}
  IDENTITY_PHONE_PROVIDER: ${IDENTITY_PHONE_PROVIDER:-sms}
  IDENTITY_SMS_PROVIDER: ${IDENTITY_SMS_PROVIDER:-briq}
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  RESEND_FROM: ${RESEND_FROM:-}
  RESEND_REPLY_TO: ${RESEND_REPLY_TO:-}
  BRIQ_API_KEY: ${BRIQ_API_KEY:-}
  BRIQ_SMS_BASE_URL: ${BRIQ_SMS_BASE_URL:-https://karibu.briq.tz}
  BRIQ_SMS_SENDER: ${BRIQ_SMS_SENDER:-BRIQ}
  BEEM_API_KEY: ${BEEM_API_KEY:-}
  BEEM_SECRET_KEY: ${BEEM_SECRET_KEY:-}
  BEEM_SMS_BASE_URL: ${BEEM_SMS_BASE_URL:-https://apisms.beem.africa}
  BEEM_SMS_SENDER: ${BEEM_SMS_SENDER:-ProcureX}
  BEEM_WHATSAPP_ENABLED: ${BEEM_WHATSAPP_ENABLED:-false}
  BEEM_WHATSAPP_FROM: ${BEEM_WHATSAPP_FROM:-}
  BEEM_WHATSAPP_TEMPLATE_OTP: ${BEEM_WHATSAPP_TEMPLATE_OTP:-}
  TRA_REGISTRY_BASE_URL: ${TRA_REGISTRY_BASE_URL:-}
  TRA_REGISTRY_API_KEY: ${TRA_REGISTRY_API_KEY:-}
  BRELA_REGISTRY_BASE_URL: ${BRELA_REGISTRY_BASE_URL:-}
  BRELA_REGISTRY_API_KEY: ${BRELA_REGISTRY_API_KEY:-}
  MAILBOXLAYER_ACCESS_KEY: ${MAILBOXLAYER_ACCESS_KEY:-}
  MAILBOXLAYER_BASE_URL: ${MAILBOXLAYER_BASE_URL:-https://apilayer.net/api/check}
  MAILBOXLAYER_EMAIL_VALIDATION_ENABLED: ${MAILBOXLAYER_EMAIL_VALIDATION_ENABLED:-true}
  MAILBOXLAYER_MIN_SCORE: ${MAILBOXLAYER_MIN_SCORE:-0.60}
  MAILBOXLAYER_BLOCK_DISPOSABLE: ${MAILBOXLAYER_BLOCK_DISPOSABLE:-true}
  MAILBOXLAYER_BLOCK_ROLE_EMAILS: ${MAILBOXLAYER_BLOCK_ROLE_EMAILS:-false}
  MAILBOXLAYER_REQUIRE_SMTP: ${MAILBOXLAYER_REQUIRE_SMTP:-false}
  MAILBOXLAYER_SMTP_CHECK: ${MAILBOXLAYER_SMTP_CHECK:-true}
  SIGNATURE_HASH_SECRET: ${SIGNATURE_HASH_SECRET:-}
  BID_ENCRYPTION_KEY: ${BID_ENCRYPTION_KEY:-}
  BID_DOCUMENT_ENCRYPTION_KEY_REF: ${BID_DOCUMENT_ENCRYPTION_KEY_REF:-production-v1}
  AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-10}
  AUTH_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:-60}
  API_MUTATION_RATE_LIMIT_MAX: ${API_MUTATION_RATE_LIMIT_MAX:-120}
  API_MUTATION_RATE_LIMIT_WINDOW_SECONDS: ${API_MUTATION_RATE_LIMIT_WINDOW_SECONDS:-60}
  SUPPORT_EMAIL_TO: ${SUPPORT_EMAIL_TO:-support@example.com}

services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    environment:
      PROCUREX_SITE_ADDRESS: ${PROCUREX_SITE_ADDRESS:-localhost}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:-admin@example.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      server:
        condition: service_healthy
    networks:
      - public
      - private

  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
      target: runtime
    restart: unless-stopped
    environment: *server-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    volumes:
      - server-data:/app/server/.data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - private

  migrate:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
      target: migrator
    restart: "no"
    environment: *server-environment
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - private

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-procurex}
      POSTGRES_USER: ${POSTGRES_USER:-procurex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - private

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - private

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.2
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    networks:
      - private

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-procurex}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-minio-secret}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - private

  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-procurex}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-minio-secret}
      S3_DOCUMENT_BUCKET: ${S3_DOCUMENT_BUCKET:-procurex-documents}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set procurex http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "procurex/$$S3_DOCUMENT_BUCKET"
        mc anonymous set none "procurex/$$S3_DOCUMENT_BUCKET"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - private

networks:
  public:
  private:

volumes:
  caddy-data:
  caddy-config:
  postgres-data:
  redis-data:
  elasticsearch-data:
  minio-data:
  server-data:
